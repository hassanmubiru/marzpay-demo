<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StreetJS + MarzPay Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!--
      Home_Page (Requirements 3.1, 3.2, 3.3, 3.4).
      This is a fully static template (no placeholders) rendered as-is by HomeController.
      Contract enforced here:
        - Req 3.1: contains the exact text "StreetJS + MarzPay Demo".
        - Req 3.2: exactly ONE input control for the mobile-money phone number.
        - Req 3.3: exactly ONE enabled button labeled exactly "Pay 5000 UGX".
        - Req 3.4: the button submits the phone number to /checkout via the form's POST.
    -->
    <main class="card">
      <h1>StreetJS + MarzPay Demo</h1>
      <p class="lead">
        Enter your mobile-money phone number and pay to start a real
        MarzPay sandbox collection in Uganda (UGX).
      </p>

      <form class="pay-form" method="POST" action="/checkout">
        <label class="field" for="phone_number">Mobile-money phone number</label>
        <input
          id="phone_number"
          name="phone_number"
          type="tel"
          inputmode="tel"
          autocomplete="tel"
          placeholder="e.g. +256700000000"
          required
        />

        <button type="submit">Pay 5000 UGX</button>
      </form>
    </main>
  </body>
</html>
